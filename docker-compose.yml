# ─────────────────────────────────────────────────────
#  cyberm4fia-scanner — Docker Compose
#
#  Usage:
#    1) Create a .env file with NVIDIA_API_KEY=your_key_here
#    2) docker compose up
# ─────────────────────────────────────────────────────

services:
  # ── Scanner ──
  scanner:
    build: .
    container_name: cyberm4fia-scanner
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    entrypoint: ["python3", "scanner.py"]
    stdin_open: true
    tty: true
