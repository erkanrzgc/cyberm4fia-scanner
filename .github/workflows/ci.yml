name: cyberm4fia-scanner Scanner CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check . --select E,F --ignore E501

      - name: Check formatting
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all Python files
        run: |
          python -c "
          import py_compile, glob, sys
          errors = []
          for f in glob.glob('**/*.py', recursive=True):
              if 'venv/' in f or '.venv/' in f:
                  continue
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All files compile OK!')
          "
