<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d2d"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff2d2d"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41"/>
      <stop offset="100%" style="stop-color:#00cc33"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#00ff41" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="300"/><line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/><line x1="440" y1="0" x2="440" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/><line x1="520" y1="0" x2="520" y2="300"/>
    <line x1="560" y1="0" x2="560" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="640" y1="0" x2="640" y2="300"/><line x1="680" y1="0" x2="680" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/><line x1="760" y1="0" x2="760" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="798" height="298" rx="12" fill="none" stroke="#ff2d2d" stroke-width="1" opacity="0.3"/>

  <!-- Scanline effect -->
  <rect x="0" y="85" width="800" height="1" fill="#00ff41" opacity="0.06"/>
  <rect x="0" y="170" width="800" height="1" fill="#00ff41" opacity="0.04"/>
  <rect x="0" y="215" width="800" height="1" fill="#00ff41" opacity="0.06"/>

  <!-- Left side terminal output -->
  <text x="30" y="45" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.3">[*] scanning target...</text>
  <text x="30" y="60" font-family="monospace" font-size="10" fill="#ff2d2d" opacity="0.3">[!] SQLi found: union-based</text>
  <text x="30" y="75" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.3">[*] XSS payload delivered</text>

  <!-- Right side terminal output -->
  <text x="570" y="45" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.3">modules: 40+</text>
  <text x="570" y="60" font-family="monospace" font-size="10" fill="#ff6b35" opacity="0.3">AI: WhiteRabbitNeo</text>
  <text x="570" y="75" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.3">payloads: loaded</text>

  <!-- Main title -->
  <text x="400" y="140" font-family="monospace" font-size="48" font-weight="bold" fill="url(#red)" text-anchor="middle" filter="url(#glow-red)">CYBERM4FIA</text>

  <!-- Scanner subtitle -->
  <text x="400" y="175" font-family="monospace" font-size="20" fill="#00ff41" text-anchor="middle" filter="url(#glow)" letter-spacing="8">S C A N N E R</text>

  <!-- Tagline -->
  <text x="400" y="210" font-family="system-ui, sans-serif" font-size="13" fill="#888888" text-anchor="middle">Modular Red Team Security Scanner</text>

  <!-- Bottom stats bar -->
  <rect x="80" y="235" width="640" height="1" fill="#222" rx="1"/>

  <!-- Stats -->
  <text x="160" y="265" font-family="monospace" font-size="12" fill="#ff2d2d" text-anchor="middle">16+ Vuln Modules</text>
  <text x="330" y="265" font-family="monospace" font-size="12" fill="#00ff41" text-anchor="middle">AI Exploit Agent</text>
  <text x="490" y="265" font-family="monospace" font-size="12" fill="#ff6b35" text-anchor="middle">MITM Proxy</text>
  <text x="650" y="265" font-family="monospace" font-size="12" fill="#888888" text-anchor="middle">REST API</text>

  <!-- Separator dots -->
  <circle cx="245" cy="262" r="2" fill="#333"/>
  <circle cx="410" cy="262" r="2" fill="#333"/>
  <circle cx="570" cy="262" r="2" fill="#333"/>

  <!-- Authorized testing badge -->
  <rect x="280" y="278" width="240" height="18" rx="3" fill="#ff2d2d" opacity="0.15"/>
  <text x="400" y="291" font-family="monospace" font-size="10" fill="#ff2d2d" text-anchor="middle" opacity="0.7">- Authorized Security Testing Only -</text>
</svg>
